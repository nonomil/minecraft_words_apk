<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test Advanced Settings</title>
</head>
<body>
    <h1>测试高级设置按钮</h1>
    <button id="test-btn">点击测试</button>
    <div id="result"></div>
    
    <script>
        // 模拟检查
        setTimeout(() => {
            const advancedModal = document.getElementById('advanced-settings-modal');
            const btnAdvanced = document.getElementById('btn-settings-advanced');
            
            const result = document.getElementById('result');
            result.innerHTML = `
                <p>advanced-settings-modal 存在: ${!!advancedModal}</p>
                <p>btn-settings-advanced 存在: ${!!btnAdvanced}</p>
            `;
            
            if (!advancedModal) {
                result.innerHTML += '<p style="color:red">❌ 找不到 #advanced-settings-modal 元素</p>';
            }
            if (!btnAdvanced) {
                result.innerHTML += '<p style="color:red">❌ 找不到 #btn-settings-advanced 按钮</p>';
            }
        }, 100);
    </script>
    
    <!-- 加载实际的 Game.html 来测试 -->
    <iframe src="Game.html" style="width:100%;height:600px;border:1px solid #ccc;margin-top:20px;"></iframe>
</body>
</html>
